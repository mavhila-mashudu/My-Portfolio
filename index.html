<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Mashudu's Portfolio</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&family=Playfair+Display:ital,wght@0,400;0,500;0,700;1,400;1,500&family=DM+Sans:wght@300;400;500;600;700&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/devicons/devicon@latest/devicon.min.css">

  <link rel="stylesheet" href="css/variables.css">
  <link rel="stylesheet" href="css/reset.css">
  <link rel="stylesheet" href="css/layout.css">
  <link rel="stylesheet" href="css/components.css">
</head>
<body>
  <nav class="site-nav" aria-label="Primary navigation">
    <a class="site-nav-brand" href="#top" aria-label="Mashudu Mavhila home">
      <img src="assets/icons/wits_logo.png" alt="University of the Witwatersrand logo">
      <strong>Mashudu Mavhila</strong>
    </a>

    <ul class="site-nav-links" aria-label="Section links">
      <li><a href="#top">Home</a></li>
      <li><a href="#projects">Projects</a></li>
      <li><a href="#skills">Skills</a></li>
      <li><a href="#journey">Journey</a></li>
      <li><a href="#why-hire-me">Service</a></li>
      <li><a href="#about">About Me</a></li>
      <li><a href="#contact">Contact</a></li>
    </ul>
  </nav>

  <header id="top" class="hero-section">
    <nav class="hero-topbar" aria-label="Hero navigation">
      <a class="hero-topbrand" href="#top" aria-label="Mashudu Mavhila home">
        <img src="assets/icons/wits_logo.png" alt="University of the Witwatersrand logo">
        <strong>Mashudu Mavhila</strong>
      </a>

      <ul class="hero-toplinks" aria-label="Hero section links">
        <li><a href="#top">Home</a></li>
        <li><a href="#projects">Projects</a></li>
        <li><a href="#skills">Skills</a></li>
        <li><a href="#journey">Journey</a></li>
        <li><a href="#why-hire-me">Service</a></li>
        <li><a href="#about">About Me</a></li>
        <li><a href="#contact">Contact</a></li>
      </ul>
    </nav>

    <section class="hero-content" aria-label="Hero introduction">
      <article class="hero-copy" id="hero-copy"></article>
      <figure class="hero-image-container" id="hero-board"></figure>
    </section>

    <figure class="wave-container" aria-hidden="true">
      <svg viewBox="0 0 1440 320" xmlns="http://www.w3.org/2000/svg" preserveAspectRatio="none">
        <path fill="#cccccc" d="M0,96 C320,288 480,32 860,96 C1160,144 1300,192 1440,128 L1440,320 L0,320 Z"></path>
        <path fill="#e6e6e6" d="M0,160 C300,280 500,120 860,160 C1140,190 1300,224 1440,160 L1440,320 L0,320 Z"></path>
        <path fill="#f5f5f5" d="M0,224 C280,280 520,180 860,210 C1120,230 1300,256 1440,192 L1440,320 L0,320 Z"></path>
      </svg>
    </figure>
  </header>

  <main>
    <section id="projects" class="projects-section">
      <header class="section-header" id="projects-header"></header>
      <section class="static-projects-grid" id="projects-grid" aria-label="All projects"></section>
    </section>

    <section id="skills" class="skills-section">
      <header class="section-header" id="skills-header"></header>
      <section class="skills-grid" id="skills-grid" aria-label="Skills list"></section>
    </section>

    <section id="journey" class="journey-section">
      <header class="section-header" id="journey-header"></header>
      <section class="timeline" id="timeline" aria-label="Journey timeline"></section>
    </section>

    <section id="why-hire-me" class="why-hire-section">
      <section class="why-hire-content" id="why-hire-content" aria-label="Why hire me"></section>
    </section>

    <section id="about" class="about-section">
      <article class="about-container" id="about-content"></article>
    </section>

    <section id="contact" class="contact-section">
      <section class="contact-container" id="contact-content" aria-label="Contact details"></section>
      <footer class="site-footer" id="site-footer"></footer>
    </section>
  </main>

  <script src="js/data.js"></script>
  <script src="js/main.js"></script>
  <script src="js/projects.js"></script>
  <script src="js/animation.js"></script>
</body>
</html>
