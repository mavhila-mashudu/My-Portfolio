<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Mashudu Mavhila | Software Engineering Portfolio</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/devicons/devicon@latest/devicon.min.css">

  <link rel="stylesheet" href="css/variables.css">
  <link rel="stylesheet" href="css/reset.css">
  <link rel="stylesheet" href="css/layout.css">
  <link rel="stylesheet" href="css/components.css">
</head>
<body>
  <header id="top" class="hero-section">
    <div class="hero-content">
      <div class="hero-copy" id="hero-copy"></div>
      <figure class="hero-image-container" id="hero-board"></figure>
    </div>

    <div class="wave-container" aria-hidden="true">
      <svg viewBox="0 0 1440 320" xmlns="http://www.w3.org/2000/svg" preserveAspectRatio="none">
        <path fill="#cccccc" d="M0,96 C320,288 480,32 860,96 C1160,144 1300,192 1440,128 L1440,320 L0,320 Z"></path>
        <path fill="#e6e6e6" d="M0,160 C300,280 500,120 860,160 C1140,190 1300,224 1440,160 L1440,320 L0,320 Z"></path>
        <path fill="#f5f5f5" d="M0,224 C280,280 520,180 860,210 C1120,230 1300,256 1440,192 L1440,320 L0,320 Z"></path>
      </svg>
    </div>
  </header>

  <main>
    <section id="projects" class="projects-section">
      <div class="section-header" id="projects-header"></div>
      <div class="featured-shell">
        <div class="carousel-wrapper" aria-label="Featured projects carousel">
          <div class="carousel" id="carousel"></div>
          <div class="carousel-controls" id="carousel-controls" aria-label="Featured project controls"></div>
        </div>
      </div>
      <div class="static-projects-grid" id="projects-grid" aria-label="All projects"></div>
    </section>

    <section id="skills" class="skills-section">
      <div class="section-header" id="skills-header"></div>
      <div class="skills-grid" id="skills-grid"></div>
    </section>

    <section id="journey" class="journey-section">
      <div class="section-header" id="journey-header"></div>
      <div class="timeline" id="timeline"></div>
    </section>

    <section id="education" class="education-section">
      <div class="section-header" id="education-header"></div>
      <div class="edu-container" id="education-list"></div>
    </section>

    <section id="hire-me" class="hire-me-section">
      <div class="hire-me-content" id="hire-me-content"></div>
    </section>

    <section id="about" class="about-section">
      <div class="about-container" id="about-content"></div>
    </section>

    <section id="contact" class="contact-section">
      <div class="contact-container" id="contact-content"></div>
      <footer class="site-footer" id="site-footer"></footer>
    </section>
  </main>

  <script src="js/data.js"></script>
  <script src="js/main.js"></script>
  <script src="js/projects.js"></script>
  <script src="js/animation.js"></script>
</body>
</html>
